<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabStatus Pro — Análisis</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/analysis.css">
</head>
<body>

<!-- ════════════════════════════════════════
     PANTALLA DE LOGIN (visible si no hay sesión)
     En análisis: el historial es público (solo lectura).
     Para guardar / eliminar se necesita sesión.
     El login se muestra solo si el usuario intenta
     una acción que requiere autenticación.
════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">◈ LABSTATUS</div>
    <div class="login-title">Acceso al sistema</div>

    <div class="login-label">Email</div>
    <input class="login-input" id="loginEmail" type="email"
      placeholder="usuario@laboratorio.com" autocomplete="email">

    <div class="login-label">Contraseña</div>
    <input class="login-input" id="loginPass" type="password"
      placeholder="••••••••" autocomplete="current-password">

    <button class="btn-login" id="btnLoginSubmit" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>

    <!-- Volver sin loguearse -->
    <div style="text-align:center;margin-top:14px">
      <button onclick="document.getElementById('loginScreen').classList.remove('visible')"
        style="background:transparent;border:none;color:var(--muted);font-size:11px;
               font-family:var(--font-mono);cursor:pointer;letter-spacing:1px">
        ← Volver sin ingresar
      </button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     APP PRINCIPAL (siempre visible en análisis)
     appRoot no se oculta aquí — el historial
     es de lectura pública. Solo guardar/borrar requiere login.
════════════════════════════════════════ -->
<div id="appRoot">

  <!-- header, igual que en index pero con la nav de análisis -->
  <header>
    <div class="logo" id="logoBtn">◈ LABSTATUS <span class="hamburger" id="hamburgerIcon">☰</span></div>

    <div class="header-nav" id="headerNav">
      <button class="nav-btn" onclick="goBack()">← Muestras</button>
      <span class="nav-btn active">⚗ Análisis</span>

      <!-- aparece solo si no hay sesión -->
      <button class="nav-btn" id="btnLoginHeader"
        onclick="document.getElementById('loginScreen').classList.add('visible')"
        style="display:none">🔒 Ingresar</button>

      <!-- nombre + salir juntos -->
      <button class="btn-logout" id="btnLogout" onclick="doLogout()" style="display:none">
        <span id="userBadge"></span> · Salir
      </button>
    </div>
  </header>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- CONTENIDO -->
  <div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">
      <span class="page-title">⚗ Hoja de Análisis</span>
      <div class="btn-row">
        <button class="btn-secondary" onclick="clearData()">✕ Limpiar</button>
        <button class="btn-secondary" onclick="window.print()">🖨 Imprimir</button>
        <button class="btn-txt"       onclick="exportTxt(null)">📄 Exportar TXT</button>
        <button class="btn-primary"   onclick="validateAll()">✓ Validar</button>
        <button class="btn-success"   onclick="pushResultsAndBack()">↩ Guardar y volver</button>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
      <div class="status-item">
        <div class="sdot sdot-ok"></div>
        <span id="stTotal">—</span>
      </div>
      <div class="status-item">
        <div class="sdot sdot-warn"></div>
        <span id="stMissing">—</span>
      </div>
      <div class="status-item">
        <div class="sdot sdot-err"></div>
        <span id="stMR">—</span>
      </div>
      <div class="status-item" style="margin-left:auto">
        <div class="sdot" id="syncDot" style="background:var(--green)"></div>
        <span class="sync-lbl" id="syncLbl">listo</span>
      </div>
    </div>

    <!-- RESUMEN DE VALIDACIÓN -->
    <div class="summary-card" id="summaryCard">
      <div class="summary-title">Resumen de validación</div>
      <div class="result-grid" id="summaryGrid"></div>
    </div>

    <!-- TABLAS ACTIVAS (generadas por JS) -->
    <div id="tablesContainer"></div>

    <!-- ESTADO VACÍO (sin payload) -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">⚗</div>
      <div class="empty-title">Sin muestras cargadas</div>
      <div class="empty-sub">
        Ve a <b>Muestras</b>, activa <b>Seleccionar</b>,<br>
        elige las órdenes y pulsa <b>⚗ Analizar</b>.
      </div>
    </div>

    <!-- HISTORIAL DE ANÁLISIS -->
    <div class="hist-section">
      <div class="hist-header">
        <span class="hist-title">Historial de análisis</span>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="histSearch" placeholder="Buscar por código de muestra..."
            oninput="renderHistory()">
        </div>
      </div>
      <div id="historyList">
        <div class="hist-loading">Cargando historial...</div>
      </div>
    </div>

  </div><!-- /container -->

</div><!-- /appRoot -->

<!-- ════════════════════════════════════════
     SCRIPTS
     Orden:
     1. Supabase SDK
     2. auth.js  → supaClient, authState, initAuth, doLogin, doLogout
     3. analysis.js → usa todo lo anterior
════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/analysis.js"></script>

</body>
</html>
