<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabStatus Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --surface:#0d1421; --surface2:#111827; --border:#1e2d45;
  --accent:#00d4ff; --green:#00e676; --yellow:#ffb300; --red:#ff4444;
  --text:#e2e8f0; --muted:#64748b;
  --font-mono:'Space Mono',monospace; --font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,.05) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(0,136,170,.04) 0%,transparent 60%);}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;
  justify-content:space-between;background:rgba(13,20,33,.92);backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;}
.logo{font-family:var(--font-mono);font-size:13px;color:var(--accent);letter-spacing:3px;}
.header-nav{display:flex;gap:8px;align-items:center;}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:6px 14px;font-family:var(--font-mono);font-size:11px;
  cursor:pointer;letter-spacing:1px;transition:all .15s;}
.nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);}
.header-stats{display:flex;gap:16px;font-size:11px;color:var(--muted);font-family:var(--font-mono);}
.header-stats span b{color:var(--text);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;
  margin-right:5px;animation:pulse 2s infinite;}
.sync-dot.syncing{background:var(--yellow);}
.sync-dot.error{background:var(--red);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.container{max-width:980px;margin:0 auto;padding:20px 14px;}

/* FORM */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-bottom:18px;position:relative;overflow:hidden;}
.add-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);}
.add-title{font-family:var(--font-mono);font-size:10px;color:var(--accent);
  letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr 80px;gap:8px;margin-bottom:8px;}
.form-row-2{display:grid;grid-template-columns:1fr auto;gap:8px;}
.input-wrap{}
.input-label{font-size:10px;color:var(--muted);font-family:var(--font-mono);
  letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:9px 11px;font-family:var(--font-body);
  font-size:13px;outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);font-size:12px;}
select option{background:var(--surface2);}
.btn-add{background:var(--accent);color:#000;border:none;border-radius:8px;
  padding:9px 20px;font-family:var(--font-mono);font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;align-self:flex-end;transition:background .15s;}
.btn-add:hover{background:#00aacc;}

/* PROGRESS */
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;}
.progress-track{flex:1;height:5px;background:var(--border);border-radius:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:5px;transition:width .5s ease;width:0%;}
.progress-pct{font-family:var(--font-mono);font-size:12px;color:var(--accent);min-width:34px;text-align:right;}
.progress-label{font-size:10px;color:var(--muted);font-family:var(--font-mono);letter-spacing:1px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.section-title{font-family:var(--font-mono);font-size:10px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;flex:1;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:var(--font-mono);transition:all .15s;}
.btn-ghost:hover{border-color:var(--red);color:var(--red);}
.btn-ghost.active-sel{border-color:var(--accent);color:var(--accent);}
.btn-ghost.analyze-btn{border-color:var(--yellow);color:var(--yellow);}
.btn-ghost.analyze-btn:hover{background:rgba(255,179,0,.08);}
.badge-count{background:var(--border);color:var(--muted);font-family:var(--font-mono);
  font-size:10px;padding:2px 6px;border-radius:4px;}

/* ORDER CARD (padre) */
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.order-card:hover{border-color:#2a3f5f;}
.order-card.expanded{border-color:#2a3f5f;}
.order-card.selected{border-color:var(--accent);background:rgba(0,212,255,.03);}

.order-header{display:flex;align-items:center;padding:11px 15px;gap:10px;cursor:pointer;}
.order-check{width:17px;height:17px;border:1px solid var(--border);border-radius:4px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .15s;cursor:pointer;}
.order-check.checked{background:var(--accent);border-color:var(--accent);color:#000;}
.order-main{flex:1;min-width:0;}
.order-code{font-family:var(--font-mono);font-size:14px;color:var(--text);font-weight:700;}
.order-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.order-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.param-chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:4px;
  border:1px solid var(--border);color:var(--muted);background:var(--surface2);}
.chip.done{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08);}
.chip.wip{border-color:var(--yellow);color:var(--yellow);background:rgba(255,179,0,.08);}
.status-pill{font-family:var(--font-mono);font-size:10px;padding:3px 9px;
  border-radius:20px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;}
.pill-p{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.2);}
.pill-e{background:rgba(255,179,0,.1);color:var(--yellow);border:1px solid rgba(255,179,0,.2);}
.pill-c{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;transition:all .15s;flex-shrink:0;}
.btn-icon:hover{border-color:var(--red);color:var(--red);}
.expand-arr{color:var(--muted);font-size:11px;transition:transform .2s;user-select:none;flex-shrink:0;}
.order-card.expanded .expand-arr{transform:rotate(90deg);}

/* ORDER BODY */
.order-body{border-top:1px solid var(--border);padding:14px;display:none;background:rgba(0,0,0,.12);}
.order-body.open{display:block;}

/* EDIT SECTION */
.edit-section{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.12);
  border-radius:8px;padding:12px;margin-bottom:12px;}
.edit-section-title{font-family:var(--font-mono);font-size:10px;color:var(--accent);
  letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.edit-label{font-size:10px;color:var(--muted);font-family:var(--font-mono);margin-bottom:3px;
  letter-spacing:1px;text-transform:uppercase;}
.edit-field{width:100%;background:var(--surface2);border:1px solid var(--accent);
  border-radius:6px;color:var(--text);padding:6px 9px;font-family:var(--font-mono);
  font-size:12px;outline:none;}
.btn-save-edit{background:var(--accent);color:#000;border:none;border-radius:6px;
  padding:6px 14px;font-family:var(--font-mono);font-size:11px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-save-edit:hover{background:#00aacc;}

/* SUB-SAMPLES LIST */
.sub-list-title{font-family:var(--font-mono);font-size:10px;color:var(--muted);
  letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}
.sub-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  margin-bottom:6px;overflow:hidden;}
.sub-header{display:flex;align-items:center;padding:9px 12px;gap:8px;cursor:pointer;}
.sub-code{font-family:var(--font-mono);font-size:12px;color:var(--accent);font-weight:700;flex:1;}
.sub-chips{display:flex;gap:4px;flex-wrap:wrap;}
.sub-body{border-top:1px solid var(--border);padding:12px;display:none;background:rgba(0,0,0,.1);}
.sub-body.open{display:block;}
.sub-card.sub-expanded .expand-arr{transform:rotate(90deg);}

/* PARAM LIST */
.param-list-title{font-family:var(--font-mono);font-size:10px;color:var(--muted);
  letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}
.param-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;
  background:var(--surface);border:1px solid var(--border);margin-bottom:5px;}
.param-check-btn{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
  background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:10px;transition:all .15s;}
.param-check-btn.done{border-color:var(--green);background:var(--green);color:#000;}
.param-name{font-family:var(--font-mono);font-size:12px;flex:1;}
.param-status-txt{font-size:11px;color:var(--muted);}
.param-del-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;
  font-size:10px;padding:2px 4px;border-radius:3px;transition:color .15s;}
.param-del-btn:hover{color:var(--red);}
.add-param-row{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
.add-param-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:6px 9px;font-family:var(--font-mono);font-size:11px;outline:none;}
.add-param-input:focus{border-color:var(--accent);}
.add-param-input::placeholder{color:var(--muted);}
.btn-add-param{background:var(--accent);color:#000;border:none;border-radius:6px;
  padding:6px 11px;font-family:var(--font-mono);font-size:11px;font-weight:700;cursor:pointer;}
.btn-add-param:hover{background:#00aacc;}

/* ADD SUBSAMPLE */
.add-sub-row{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.add-sub-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:6px 9px;font-family:var(--font-mono);font-size:11px;outline:none;}
.add-sub-input:focus{border-color:var(--yellow);}
.add-sub-input::placeholder{color:var(--muted);}
.btn-add-sub{background:var(--yellow);color:#000;border:none;border-radius:6px;
  padding:6px 11px;font-family:var(--font-mono);font-size:11px;font-weight:700;cursor:pointer;}

/* STATUS BODY ACTIONS */
.body-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.body-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:5px 9px;font-size:11px;font-family:var(--font-mono);cursor:pointer;outline:none;}
.body-select:focus{border-color:var(--accent);}
.btn-note{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:var(--font-mono);transition:all .15s;}
.btn-note:hover{border-color:var(--accent);color:var(--accent);}
.note-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:8px 10px;font-family:var(--font-body);font-size:12px;outline:none;
  resize:vertical;min-height:54px;margin-top:8px;}
.note-input:focus{border-color:var(--accent);}

/* BULK BAR */
.bulk-bar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--accent);border-radius:12px;
  padding:11px 18px;display:none;align-items:center;gap:12px;z-index:200;
  box-shadow:0 8px 32px rgba(0,212,255,.15);}
.bulk-bar.visible{display:flex;}
.bulk-count{font-family:var(--font-mono);font-size:12px;color:var(--accent);}
.btn-bulk-del{background:var(--red);color:#fff;border:none;border-radius:6px;
  padding:6px 13px;font-size:11px;font-family:var(--font-mono);cursor:pointer;}
.btn-bulk-analyze{background:var(--yellow);color:#000;border:none;border-radius:6px;
  padding:6px 13px;font-size:11px;font-family:var(--font-mono);cursor:pointer;font-weight:700;}
.btn-bulk-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:6px 13px;font-size:11px;cursor:pointer;font-family:var(--font-mono);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:22px;max-width:340px;width:90%;}
.modal h3{font-family:var(--font-mono);font-size:13px;color:var(--red);margin-bottom:7px;}
.modal p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-confirm-del{background:var(--red);color:#fff;border:none;border-radius:6px;
  padding:7px 14px;font-family:var(--font-mono);font-size:11px;cursor:pointer;}
.btn-cancel-modal{background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:7px 14px;font-size:11px;cursor:pointer;font-family:var(--font-mono);}

/* EMPTY / SKELETON */
.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px;font-family:var(--font-mono);}
.skeleton{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:13px;margin-bottom:7px;overflow:hidden;position:relative;}
.skeleton::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);
  animation:shimmer 1.4s infinite;}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.skel-line{height:11px;background:var(--border);border-radius:4px;margin-bottom:7px;}

/* HISTORY SECTION */
.history-section{margin-top:22px;}

@media(max-width:600px){
  .form-row{grid-template-columns:1fr 1fr;}
  .header-stats{display:none;}
  .param-chips,.sub-chips{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="logo">◈ LABSTATUS</div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="window.location.href='index.html'">Muestras</button>
    <button class="nav-btn" onclick="window.location.href='analysis.html'">⚗ Análisis</button>
  </div>
  <div class="header-stats">
    <span><b id="hTotal">0</b> OS</span>
    <span><b id="hSubs">0</b> muestras</span>
    <span><b id="hDone">0</b> completadas</span>
    <span><span class="sync-dot" id="syncDot"></span><span id="syncTxt" style="font-size:10px">ok</span></span>
  </div>
</header>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">⚠ Confirmar eliminación</h3>
    <p id="modalMsg"></p>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm-del" id="modalConfirmBtn">Eliminar</button>
    </div>
  </div>
</div>

<!-- BULK BAR -->
<div class="bulk-bar" id="bulkBar">
  <span class="bulk-count" id="bulkCount">0 seleccionadas</span>
  <button class="btn-bulk-analyze" onclick="goAnalyze()">⚗ Analizar</button>
  <button class="btn-bulk-del" onclick="bulkDelete()">🗑 Eliminar</button>
  <button class="btn-bulk-cancel" onclick="clearSelection()">Cancelar</button>
</div>

<div class="container">

  <!-- FORM -->
  <div class="add-card">
    <div class="add-title">+ Nueva orden de servicio</div>
    <div class="form-row">
      <div class="input-wrap">
        <div class="input-label">Código OS *</div>
        <input id="fCode" placeholder="ej. 9345 o ICP1"/>
      </div>
      <div class="input-wrap">
        <div class="input-label">Parámetros (separados por coma)</div>
        <input id="fParams" placeholder="ej. Au, Ag, Cu"/>
      </div>
      <div class="input-wrap">
        <div class="input-label">Cliente</div>
        <input id="fClient" placeholder="Nombre del cliente"/>
      </div>
      <div class="input-wrap">
        <div class="input-label">N muestras</div>
        <input id="fN" type="number" min="1" placeholder="1"/>
      </div>
    </div>
    <div class="form-row-2">
      <div class="input-wrap">
        <div class="input-label">Estado inicial</div>
        <select id="fStatus">
          <option value="Pendiente">Pendiente</option>
          <option value="En proceso">En proceso</option>
        </select>
      </div>
      <button class="btn-add" onclick="addOrder()">+ Agregar</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-card">
    <span class="progress-label">PROGRESO</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>

  <!-- ACTIVE -->
  <div class="toolbar">
    <span class="section-title">Activas <span class="badge-count" id="countActive">0</span></span>
    <button class="btn-ghost" id="btnSelect" onclick="toggleSelectionMode()">☐ Seleccionar</button>
  </div>
  <div id="activeList"></div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="toolbar">
      <span class="section-title">Historial completadas <span class="badge-count" id="countHistory">0</span></span>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────
const BIN_URL = "https://api.jsonbin.io/v3/b/69ef96e636566621a8fa0813";
const BIN_KEY = "$2a$10$y5s3F5YdWIB9axb55/V4TuK6E/1Z5Sod/pyqxbn5H/aBLjoTAYapS";
const CACHE_KEY = "labstatus_v4";

// orders[] = [{id, code, client, status, params[], subsamples[], note, createdAt}]
// subsamples[] = [{id, code, status, params[], note}]
// params[] = [{name, done}]

let orders = [];
let expandedOrderId = null;
let expandedSubId = null;
let selectionMode = false;
let selectedIds = new Set(); // order IDs
let pendingDelete = null;

// ── INIT ────────────────────────────────────────
function init() {
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try { orders = JSON.parse(cached); render(); } catch(e) { orders = []; showSkeletons(); }
  } else { showSkeletons(); }
  loadRemote();
  setInterval(loadRemote, 30000);
}
function showSkeletons() {
  document.getElementById('activeList').innerHTML =
    '<div class="skeleton"><div class="skel-line" style="width:35%"></div><div class="skel-line" style="width:20%"></div></div>'.repeat(2);
}
function setSyncStatus(s) {
  document.getElementById('syncDot').className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
  document.getElementById('syncTxt').textContent = s==='syncing'?'sync...':s==='error'?'offline':'ok';
}
async function loadRemote() {
  setSyncStatus('syncing');
  try {
    const res = await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY}});
    if(!res.ok) throw 0;
    const data = await res.json();
    orders = data.record?.orders || [];
    sortOrders();
    localStorage.setItem(CACHE_KEY, JSON.stringify(orders));
    render(); setSyncStatus('ok');
  } catch(e){ setSyncStatus('error'); }
}
async function saveRemote() {
  setSyncStatus('syncing');
  localStorage.setItem(CACHE_KEY, JSON.stringify(orders));
  try {
    await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},
      body:JSON.stringify({orders})});
    setSyncStatus('ok');
  } catch(e){ setSyncStatus('error'); }
}

// ── SORT ────────────────────────────────────────
function sortOrders() {
  orders.sort((a,b) => a.code.localeCompare(b.code, undefined, {numeric:true, sensitivity:'base'}));
}

// ── HELPERS ─────────────────────────────────────
function pad3(n){ return String(n).padStart(3,'0'); }
function makeParams(raw) {
  return raw.split(',').map(p=>p.trim()).filter(Boolean).map(name=>({name,done:false}));
}
function cloneParams(params) { return params.map(p=>({...p})); }
function orderStatus(o) {
  if(!o.subsamples || o.subsamples.length===0) return o.status;
  const statuses = o.subsamples.map(s=>s.status);
  if(statuses.every(s=>s==='Completado')) return 'Completado';
  if(statuses.some(s=>s==='En proceso'||s==='Completado')) return 'En proceso';
  return 'Pendiente';
}
function pillClass(s){ return s==='Pendiente'?'pill-p':s==='En proceso'?'pill-e':'pill-c'; }

// ── ADD ORDER ───────────────────────────────────
function addOrder() {
  const code = document.getElementById('fCode').value.trim();
  if(!code){ shake('fCode'); return; }
  const paramsRaw = document.getElementById('fParams').value.trim();
  const client = document.getElementById('fClient').value.trim();
  const nRaw = parseInt(document.getElementById('fN').value) || 1;
  const n = Math.max(1, Math.min(nRaw, 999));
  const status = document.getElementById('fStatus').value;
  const baseParams = paramsRaw ? makeParams(paramsRaw) : [];

  const subsamples = [];
  for(let i=1; i<=n; i++){
    subsamples.push({
      id: Date.now().toString()+i,
      code: code+'/'+pad3(i),
      status,
      params: cloneParams(baseParams),
      note: ''
    });
  }
  orders.push({id:Date.now().toString(), code, client, params:baseParams, subsamples, note:'', createdAt:new Date().toISOString()});
  sortOrders();
  document.getElementById('fCode').value='';
  document.getElementById('fParams').value='';
  document.getElementById('fClient').value='';
  document.getElementById('fN').value='';
  render(); saveRemote();
}
function shake(id){
  const el=document.getElementById(id);
  el.style.borderColor='var(--red)';
  setTimeout(()=>el.style.borderColor='',800);
}

// ── ADD SUBSAMPLE ────────────────────────────────
function addSubsample(orderId) {
  const o = orders.find(x=>x.id===orderId);
  if(!o) return;
  const next = o.subsamples.length + 1;
  const firstParams = o.subsamples.length > 0 ? cloneParams(o.subsamples[0].params) : cloneParams(o.params);
  o.subsamples.push({
    id: Date.now().toString(),
    code: o.code+'/'+pad3(next),
    status: 'Pendiente',
    params: firstParams,
    note: ''
  });
  // renumber
  o.subsamples.forEach((s,i)=>{ s.code = o.code+'/'+pad3(i+1); });
  expandedOrderId = orderId;
  render(); saveRemote();
}

function deleteSubsample(orderId, subId) {
  const o = orders.find(x=>x.id===orderId);
  if(!o) return;
  o.subsamples = o.subsamples.filter(s=>s.id!==subId);
  o.subsamples.forEach((s,i)=>{ s.code = o.code+'/'+pad3(i+1); });
  expandedOrderId = orderId;
  render(); saveRemote();
}

// ── DELETE ORDER ─────────────────────────────────
function confirmDelete(id) {
  const o = orders.find(x=>x.id===id);
  pendingDelete={type:'single',id};
  document.getElementById('modalTitle').textContent='⚠ Confirmar eliminación';
  document.getElementById('modalMsg').textContent=`¿Eliminar OS "${o.code}" y todas sus muestras?`;
  document.getElementById('modalConfirmBtn').onclick=executeDelete;
  document.getElementById('modalOverlay').classList.add('open');
}
function executeDelete() {
  if(!pendingDelete) return;
  if(pendingDelete.type==='single') orders=orders.filter(o=>o.id!==pendingDelete.id);
  else { orders=orders.filter(o=>!selectedIds.has(o.id)); clearSelection(); }
  closeModal(); render(); saveRemote();
}
function bulkDelete() {
  pendingDelete={type:'bulk'};
  document.getElementById('modalTitle').textContent='⚠ Eliminar seleccionadas';
  document.getElementById('modalMsg').textContent=`¿Eliminar ${selectedIds.size} OS seleccionadas?`;
  document.getElementById('modalConfirmBtn').onclick=executeDelete;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); pendingDelete=null; }
document.getElementById('modalOverlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

// ── SELECTION ────────────────────────────────────
function toggleSelectionMode(){
  selectionMode=!selectionMode;
  if(!selectionMode) clearSelection();
  document.getElementById('btnSelect').classList.toggle('active-sel',selectionMode);
  document.getElementById('btnSelect').textContent=selectionMode?'✕ Cancelar':'☐ Seleccionar';
  render();
}
function toggleSelect(id){
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  updateBulkBar(); render();
}
function clearSelection(){
  selectedIds.clear(); selectionMode=false;
  document.getElementById('btnSelect').textContent='☐ Seleccionar';
  document.getElementById('btnSelect').classList.remove('active-sel');
  updateBulkBar();
}
function updateBulkBar(){
  const bar=document.getElementById('bulkBar');
  if(selectedIds.size>0){
    bar.classList.add('visible');
    document.getElementById('bulkCount').textContent=`${selectedIds.size} seleccionada(s)`;
  } else bar.classList.remove('visible');
}

// ── GO ANALYZE ───────────────────────────────────
function goAnalyze(){
  // Collect all subsamples from selected orders, store in sessionStorage
  const selected = orders.filter(o=>selectedIds.has(o.id));
  // Flatten subsamples with their params
  const payload = selected.flatMap(o => o.subsamples.map(s => ({
    orderCode: o.code,
    client: o.client,
    subCode: s.code,
    subId: s.id,
    params: s.params.map(p=>p.name)
  })));
  sessionStorage.setItem('analyze_payload', JSON.stringify(payload));
  window.location.href = 'analysis.html';
}

// ── STATUS / PARAMS ──────────────────────────────
function changeSubStatus(orderId, subId, val){
  const o=orders.find(x=>x.id===orderId);
  const s=o?.subsamples.find(x=>x.id===subId);
  if(!s) return;
  s.status=val;
  if(val==='Completado') s.params.forEach(p=>p.done=true);
  expandedOrderId=orderId; expandedSubId=subId;
  render(); saveRemote();
}
function toggleParam(orderId, subId, idx){
  const o=orders.find(x=>x.id===orderId);
  const s=o?.subsamples.find(x=>x.id===subId);
  if(!s) return;
  s.params[idx].done=!s.params[idx].done;
  if(s.params.length>0 && s.params.every(p=>p.done)) s.status='Completado';
  else if(s.params.some(p=>!p.done) && s.status==='Completado') s.status='En proceso';
  expandedOrderId=orderId; expandedSubId=subId;
  render(); saveRemote();
}
function addParamInline(orderId, subId){
  const el=document.getElementById('newparam_'+subId);
  if(!el) return;
  const names=el.value.split(',').map(p=>p.trim()).filter(Boolean);
  if(!names.length) return;
  const o=orders.find(x=>x.id===orderId);
  const s=o?.subsamples.find(x=>x.id===subId);
  if(!s) return;
  names.forEach(name=>s.params.push({name,done:false}));
  el.value='';
  expandedOrderId=orderId; expandedSubId=subId;
  render(); saveRemote();
}
function deleteParam(orderId, subId, idx){
  const o=orders.find(x=>x.id===orderId);
  const s=o?.subsamples.find(x=>x.id===subId);
  if(!s) return;
  s.params.splice(idx,1);
  if(s.params.length>0&&s.params.every(p=>p.done)) s.status='Completado';
  else if(s.params.some(p=>!p.done)&&s.status==='Completado') s.status='En proceso';
  expandedOrderId=orderId; expandedSubId=subId;
  render(); saveRemote();
}

// ── INLINE EDIT ORDER ────────────────────────────
function saveOrderEdit(id){
  const o=orders.find(x=>x.id===id);
  if(!o) return;
  const codeEl=document.getElementById('edit_code_'+id);
  const clientEl=document.getElementById('edit_client_'+id);
  const newCode=codeEl?.value.trim()||o.code;
  if(newCode!==o.code){
    o.code=newCode;
    o.subsamples.forEach((s,i)=>{ s.code=newCode+'/'+pad3(i+1); });
  }
  if(clientEl) o.client=clientEl.value.trim();
  sortOrders();
  expandedOrderId=id;
  render(); saveRemote();
}

function saveNote(orderId, subId){
  const el=document.getElementById('note_'+subId);
  if(!el) return;
  const o=orders.find(x=>x.id===orderId);
  const s=o?.subsamples.find(x=>x.id===subId);
  if(!s) return;
  s.note=el.value;
  saveRemote();
}

// ── EXPAND ───────────────────────────────────────
function toggleOrder(id){
  if(selectionMode){ toggleSelect(id); return; }
  expandedOrderId = expandedOrderId===id ? null : id;
  expandedSubId=null;
  render();
}
function toggleSub(subId){
  expandedSubId = expandedSubId===subId ? null : subId;
  render();
}
function toggleNote(subId){
  const el=document.getElementById('notearea_'+subId);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

// ── RENDER ───────────────────────────────────────
function render(){
  // Compute status from subsamples
  orders.forEach(o=>{ o._computed=orderStatus(o); });

  const active=orders.filter(o=>o._computed!=='Completado');
  const history=orders.filter(o=>o._computed==='Completado');
  const totalSubs=orders.reduce((a,o)=>a+o.subsamples.length,0);
  const doneSubs=orders.reduce((a,o)=>a+o.subsamples.filter(s=>s.status==='Completado').length,0);
  const pct=totalSubs?Math.round(doneSubs/totalSubs*100):0;

  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('hTotal').textContent=orders.length;
  document.getElementById('hSubs').textContent=totalSubs;
  document.getElementById('hDone').textContent=history.length;
  document.getElementById('countActive').textContent=active.length;
  document.getElementById('countHistory').textContent=history.length;

  document.getElementById('activeList').innerHTML=active.length
    ? active.map(o=>renderOrder(o)).join('')
    : '<div class="empty">◈ No hay órdenes activas</div>';

  document.getElementById('historyList').innerHTML=history.length
    ? history.map(o=>renderOrder(o)).join('')
    : '<div class="empty" style="padding:16px;font-size:10px">Sin historial</div>';
}

function renderOrder(o){
  const isExp=expandedOrderId===o.id;
  const isSel=selectedIds.has(o.id);
  const st=o._computed||orderStatus(o);
  const n=o.subsamples.length;

  // Display code in header
  let displayCode=o.code;
  if(n>1){
    displayCode=`${o.code}/<span style="color:var(--muted)">(001–${pad3(n)})</span>`;
  }

  // Aggregate chips: unique params across all subs, green if all done
  const paramMap={};
  o.subsamples.forEach(s=>s.params.forEach(p=>{
    if(!paramMap[p.name]) paramMap[p.name]={total:0,done:0};
    paramMap[p.name].total++;
    if(p.done) paramMap[p.name].done++;
  }));
  const chipsHtml=Object.entries(paramMap).map(([name,v])=>`
    <span class="chip ${v.done===v.total&&v.total>0?'done':v.done>0?'wip':''}">${name}${v.done===v.total&&v.total>0?' ✓':''}</span>`).join('')
    || `<span style="font-size:10px;color:var(--muted);font-family:var(--font-mono)">sin params</span>`;

  const checkHtml=selectionMode
    ? `<div class="order-check ${isSel?'checked':''}" onclick="event.stopPropagation();toggleSelect('${o.id}')">${isSel?'✓':''}</div>`
    : '';

  // Edit section
  const editHtml=`
    <div class="edit-section">
      <div class="edit-section-title">✎ Editar OS</div>
      <div class="edit-grid">
        <div><div class="edit-label">Código</div>
          <input class="edit-field" id="edit_code_${o.id}" value="${o.code}" onkeydown="if(event.key==='Enter')saveOrderEdit('${o.id}')"/></div>
        <div><div class="edit-label">Cliente</div>
          <input class="edit-field" id="edit_client_${o.id}" value="${o.client||''}" placeholder="Cliente" onkeydown="if(event.key==='Enter')saveOrderEdit('${o.id}')"/></div>
      </div>
      <button class="btn-save-edit" onclick="saveOrderEdit('${o.id}')">Guardar</button>
    </div>`;

  // Subsamples list
  const subsHtml=`
    <div class="sub-list-title">Muestras internas (${o.subsamples.filter(s=>s.status==='Completado').length}/${n} completadas)</div>
    ${o.subsamples.map(s=>renderSub(o.id,s)).join('')}
    <div class="add-sub-row">
      <input class="add-sub-input" placeholder="Añadir submuestra (hereda params de la primera)"/>
      <button class="btn-add-sub" onclick="addSubsample('${o.id}')">+ Submuestra</button>
    </div>`;

  return `
  <div class="order-card ${isExp?'expanded':''} ${isSel?'selected':''}" id="ocard_${o.id}">
    <div class="order-header" onclick="toggleOrder('${o.id}')">
      ${checkHtml}
      <div class="order-main">
        <div class="order-code">${displayCode}</div>
        ${o.client?`<div class="order-meta">${o.client} · ${n} muestra${n>1?'s':''}</div>`:`<div class="order-meta">${n} muestra${n>1?'s':''}</div>`}
      </div>
      <div class="param-chips">${chipsHtml}</div>
      <div class="order-right" onclick="event.stopPropagation()">
        <span class="status-pill ${pillClass(st)}">${st}</span>
        <button class="btn-icon" onclick="confirmDelete('${o.id}')">✕</button>
        <span class="expand-arr">▶</span>
      </div>
    </div>
    <div class="order-body ${isExp?'open':''}">
      ${editHtml}
      ${subsHtml}
    </div>
  </div>`;
}

function renderSub(orderId, s){
  const isExp=expandedSubId===s.id;
  const doneCount=s.params.filter(p=>p.done).length;
  const chipsHtml=s.params.map(p=>`
    <span class="chip ${p.done?'done':s.status==='En proceso'?'wip':''}">${p.name}${p.done?' ✓':''}</span>`).join('')
    || `<span style="font-size:10px;color:var(--muted)">sin params</span>`;

  const paramsListHtml=`
    <div class="param-list-title">Parámetros (${doneCount}/${s.params.length})</div>
    ${s.params.map((p,i)=>`
      <div class="param-row">
        <button class="param-check-btn ${p.done?'done':''}" onclick="toggleParam('${orderId}','${s.id}',${i})">${p.done?'✓':''}</button>
        <span class="param-name">${p.name}</span>
        <span class="param-status-txt" style="color:${p.done?'var(--green)':s.status==='En proceso'?'var(--yellow)':'var(--muted)'}">${p.done?'✓ Listo':s.status==='En proceso'?'En proceso':'Pendiente'}</span>
        <button class="param-del-btn" onclick="deleteParam('${orderId}','${s.id}',${i})">✕</button>
      </div>`).join('')}
    <div class="add-param-row">
      <input class="add-param-input" id="newparam_${s.id}" placeholder="Añadir params (ej: Zn, Fe)"
        onkeydown="if(event.key==='Enter')addParamInline('${orderId}','${s.id}')"/>
      <button class="btn-add-param" onclick="addParamInline('${orderId}','${s.id}')">+</button>
    </div>`;

  const noteHtml=`<textarea class="note-input" id="note_${s.id}" placeholder="Notas..." onblur="saveNote('${orderId}','${s.id}')">${s.note||''}</textarea>`;

  return `
  <div class="sub-card ${isExp?'sub-expanded':''}">
    <div class="sub-header" onclick="toggleSub('${s.id}')">
      <span class="sub-code">${s.code}</span>
      <div class="sub-chips">${chipsHtml}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0" onclick="event.stopPropagation()">
        <span class="status-pill ${pillClass(s.status)}">${s.status}</span>
        <button class="btn-icon" style="width:24px;height:24px;font-size:10px" onclick="deleteSubsample('${orderId}','${s.id}')">✕</button>
        <span class="expand-arr" style="font-size:10px">▶</span>
      </div>
    </div>
    <div class="sub-body ${isExp?'open':''}">
      ${paramsListHtml}
      <div class="body-actions">
        <select class="body-select" onchange="changeSubStatus('${orderId}','${s.id}',this.value)">
          <option ${s.status==='Pendiente'?'selected':''}>Pendiente</option>
          <option ${s.status==='En proceso'?'selected':''}>En proceso</option>
          <option ${s.status==='Completado'?'selected':''}>Completado</option>
        </select>
        <button class="btn-note" onclick="toggleNote('${s.id}')">📝 Notas</button>
      </div>
      <div id="notearea_${s.id}" style="display:none">${noteHtml}</div>
    </div>
  </div>`;
}

// Enter en código
document.getElementById('fCode').addEventListener('keydown',e=>{ if(e.key==='Enter') addOrder(); });

init();
</script>
</body>
</html>
